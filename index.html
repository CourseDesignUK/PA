<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AR Wildfire Sim v1.0</title>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 5px; pointer-events: none; }
        .data { font-family: monospace; color: #ff4500; font-weight: bold; }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">

<div id="ui">
    <div>Burned: <span id="acresDisplay" class="data">0.00</span> cm²</div>
    <div style="font-size: 10px; margin-top: 5px;">Point camera at HIRO marker</div>
</div>

<script>
    // --- SIMULATION CONFIG ---
    const CONFIG = {
        count: 50000,    // Reduced for mobile AR stability
        worldSize: 1.0,  // Anchored to marker width (1.0 units)
        cellSize: 0.04,
        baseSpreadRate: 0.05,
        dryingRate: 0.08,
        unitScale: 1000  // cm2 display scale
    };

    const S_LIVE = 0, S_BURNING = 2, S_CHARRED = 3;
    const FUEL_PROPS = {
        spread: 1.5,
        burn: 2.0,
        scaleY: 0.015,
        scaleXZ: 0.005
    };

    let spatialMap = [], areaBurned = 0;
    const mapDim = Math.ceil(CONFIG.worldSize / CONFIG.cellSize) + 2;
    const mapOffset = CONFIG.worldSize / 2;
    const STRIDE = 8;
    let data = new Float32Array(CONFIG.count * STRIDE);

    // --- THREE.JS & AR.JS SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.Camera();
    scene.add(camera);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setClearColor(new THREE.Color('lightgrey'), 0);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.domElement.style.position = 'absolute';
    renderer.domElement.style.top = '0px';
    renderer.domElement.style.left = '0px';
    document.body.appendChild(renderer.domElement);

    // Initialize AR Toolkit
    const arToolkitSource = new THREEx.ArToolkitSource({ sourceType: 'webcam' });
    arToolkitSource.init(() => {
        setTimeout(() => arToolkitSource.onResizeElement(renderer.domElement), 1000);
    });

    const arToolkitContext = new THREEx.ArToolkitContext({
        cameraParametersUrl: 'https://raw.githack.com/AR-js-org/AR.js/master/data/data/camera_para.dat',
        detectionMode: 'mono'
    });
    arToolkitContext.init(() => {
        camera.projectionMatrix.copy(arToolkitContext.getProjectionMatrix());
    });

    // Anchor group attached to marker
    const markerRoot = new THREE.Group();
    scene.add(markerRoot);
    const markerControls = new THREEx.ArMarkerControls(arToolkitContext, markerRoot, {
        type: 'preset', preset: 'hiro'
    });

    // --- SIMULATION MESH ---
    const fuelGeo = new THREE.BoxGeometry(1, 1, 1);
    fuelGeo.translate(0, 0.5, 0);
    const mesh = new THREE.InstancedMesh(fuelGeo, new THREE.MeshBasicMaterial(), CONFIG.count);
    markerRoot.add(mesh);

    const _mat = new THREE.Matrix4(), _vpos = new THREE.Vector3(), _vscale = new THREE.Vector3(), _vcol = new THREE.Color();

    function initSim() {
        spatialMap = new Array(mapDim * mapDim).fill(0).map(() => []);
        for(let i=0; i<CONFIG.count; i++) {
            const idx = i * STRIDE;
            const x = (Math.random() - 0.5) * CONFIG.worldSize;
            const z = (Math.random() - 0.5) * CONFIG.worldSize;
            
            data[idx] = x; data[idx+1] = z; data[idx+2] = S_LIVE; data[idx+3] = 100;
            data[idx+4] = 2000;
            
            _vpos.set(x, 0, z);
            _vscale.set(FUEL_PROPS.scaleXZ, FUEL_PROPS.scaleY, FUEL_PROPS.scaleXZ);
            _mat.compose(_vpos, new THREE.Quaternion(), _vscale);
            mesh.setMatrixAt(i, _mat);
            mesh.setColorAt(i, _vcol.setHex(0x228b22));

            // Initial Ignition Point
            if(Math.abs(x) < 0.05 && Math.abs(z) < 0.05) {
                data[idx+2] = S_BURNING;
                data[idx+3] = 0;
            }
        }
    }

    function updatePhysics() {
        for(let i=0; i<spatialMap.length; i++) spatialMap[i].length = 0;
        for(let i=0; i<CONFIG.count; i++) {
            if(data[i*STRIDE+2] === S_BURNING) {
                const gx = Math.floor((data[i*STRIDE] + mapOffset) / CONFIG.cellSize);
                const gz = Math.floor((data[i*STRIDE+1] + mapOffset) / CONFIG.cellSize);
                if(gx>=0 && gx<mapDim && gz>=0 && gz<mapDim) spatialMap[gz*mapDim+gx].push(i);
            }
        }

        let needColor = false, needMatrix = false;
        for(let i=0; i<CONFIG.count; i++) {
            const idx = i * STRIDE, state = data[idx+2];
            if(state === S_CHARRED) continue;

            if(state === S_BURNING) {
                data[idx+4] -= 5;
                if(data[idx+4] <= 0) {
                    data[idx+2] = S_CHARRED; areaBurned += 0.0001;
                    mesh.setColorAt(i, _vcol.setHex(0x111111));
                    _vpos.set(data[idx], 0, data[idx+1]);
                    _vscale.set(FUEL_PROPS.scaleXZ, 0.001, FUEL_PROPS.scaleXZ);
                    _mat.compose(_vpos, new THREE.Quaternion(), _vscale);
                    mesh.setMatrixAt(i, _mat); needColor = true; needMatrix = true;
                }
                continue;
            }

            const gx = Math.floor((data[idx]+mapOffset)/CONFIG.cellSize), gz = Math.floor((data[idx+1]+mapOffset)/CONFIG.cellSize);
            let heat = 0;
            for(let nz=gz-1; nz<=gz+1; nz++) {
                for(let nx=gx-1; nx<=gx+1; nx++) {
                    if(nx<0 || nx>=mapDim || nz<0 || nz>=mapDim) continue;
                    const cell = spatialMap[nz*mapDim+nx];
                    for(let k=0; k<cell.length; k++) {
                        const nIdx = cell[k]*STRIDE;
                        const dSq = Math.pow(data[idx]-data[nIdx], 2) + Math.pow(data[idx+1]-data[nIdx+1], 2);
                        if(dSq < 0.0016) heat += (1.0 - Math.sqrt(dSq)/0.04) * CONFIG.baseSpreadRate;
                    }
                }
            }
            if(heat > 0) {
                data[idx+3] -= heat * CONFIG.dryingRate;
                if(data[idx+3] <= 0) {
                    data[idx+2] = S_BURNING; mesh.setColorAt(i, _vcol.setHex(0xff4500)); needColor = true;
                }
            }
        }
        if(needColor) mesh.instanceColor.needsUpdate = true;
        if(needMatrix) mesh.instanceMatrix.needsUpdate = true;
        document.getElementById('acresDisplay').textContent = (areaBurned * CONFIG.unitScale).toFixed(2);
    }

    initSim();

    function render() {
        requestAnimationFrame(render);
        if (arToolkitSource.ready) {
            arToolkitContext.update(arToolkitSource.domElement);
            updatePhysics();
        }
        renderer.render(scene, camera);
    }
    render();

    window.addEventListener('resize', () => {
        arToolkitSource.onResizeElement(renderer.domElement);
        camera.projectionMatrix.copy(arToolkitContext.getProjectionMatrix());
    });
</script>
</body>
</html>
