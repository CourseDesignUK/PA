<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Component Explorer</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root {
            --brand-cyan: #00e5ff;
            --brand-bg: #0a111a; /* Darkened for better contrast with 3D models */
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --font-stack: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            background: var(--brand-bg); 
            font-family: var(--font-stack);
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            width: 100vw;
        }

        /* The 3D Canvas - sits behind the UI */
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: var(--brand-bg);
            --poster-color: transparent;
        }
        
        #instruction-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--text-main);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 24px;
            z-index: 100;
            white-space: nowrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-group label {
            opacity: 0.6;
        }

        select, input[type="range"] {
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            color: var(--brand-cyan);
            border: 1px solid var(--glass-border);
            padding: 6px 12px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-family: var(--font-stack);
            font-size: 13px;
            transition: all 0.2s ease;
        }

        select:hover, input[type="range"]:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--brand-cyan);
        }

        option {
            background: #0f172a;
            color: white;
        }

        input[type="range"] {
            width: 80px;
            height: 4px;
            padding: 0;
            cursor: ew-resize;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 12px;
            height: 12px;
            background: var(--brand-cyan);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--brand-cyan);
        }

        .divider {
            width: 1px;
            height: 20px;
            background: var(--glass-border);
        }

        /* Loading progress bar */
        #progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            background: var(--brand-cyan);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="main-viewer"
        src="models/90LFE2.glb" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1" 
        environment-image="neutral"
        exposure="1"
        interaction-prompt="auto">
        
        <div id="progress-bar" slot="progress-bar"></div>
    </model-viewer>

    <div id="instruction-panel">
        <div class="control-group">
            <label>MODEL</label>
            <select id="model-select">
                <option value="models/90LFE2.glb">90L Component</option>
                <option value="models/Water FAFA.glb">Water System</option>
                <option value="models/chassis.glb">Chassis</option>
            </select>
        </div>

        <div class="divider"></div>

        <div class="control-group">
            <label>ZOOM</label>
            <input type="range" id="zoom-control" min="10" max="80" value="45" step="1">
        </div>

        <div class="divider"></div>

        <div class="control-group">
            <label>SCALE</label>
            <input type="range" id="scale-control" min="0.1" max="2.5" step="0.1" value="1.0">
        </div>
    </div>

    <script>
        const viewer = document.getElementById('main-viewer');
        const modelSelect = document.getElementById('model-select');
        const zoomControl = document.getElementById('zoom-control');
        const scaleControl = document.getElementById('scale-control');
        const progressBar = document.getElementById('progress-bar');

        // 1. Switch Models
        modelSelect.addEventListener('change', (e) => {
            viewer.src = e.target.value;
        });

        // 2. Adjust Zoom (Field of View)
        // Note: Field of View is inverted (smaller number = more zoom)
        zoomControl.addEventListener('input', (e) => {
            const fov = e.target.value;
            viewer.fieldOfView = `${fov}deg`;
        });

        // 3. Adjust Scale
        scaleControl.addEventListener('input', (e) => {
            const s = e.target.value;
            // Scale requires x y z values
            viewer.scale = `${s} ${s} ${s}`;
        });

        // 4. Loading Progress Logic
        viewer.addEventListener('progress', (event) => {
            const progress = event.detail.totalProgress * 100;
            progressBar.style.width = `${progress}%`;
            if (progress === 100) {
                setTimeout(() => progressBar.style.width = '0%', 300);
            }
        });
    </script>
</body>
</html>
