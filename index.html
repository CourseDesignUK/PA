<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Component Explorer</title>
    <style>
        :root {
            --brand-cyan: #00e5ff;
            --brand-dark: #0f1113; /* Matches XR Training Labs dark background */
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body { margin: 0; overflow: hidden; background: var(--brand-dark); font-family: 'Inter', sans-serif; }
        
        #instruction-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            pointer-events: none;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 40px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            display: flex;
            gap: 30px;
            z-index: 100;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .key {
            background: rgba(255,255,255,0.15);
            padding: 2px 8px;
            border-radius: 4px;
            color: var(--brand-cyan);
            font-weight: 800;
            border: 1px solid rgba(0, 229, 255, 0.3);
        }

        #label {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(0,0,0,0.7);
            padding: 8px 24px;
            border-radius: 4px;
            display: none;
            pointer-events: none;
            border-bottom: 2px solid var(--brand-cyan);
        }

        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="instruction-panel">
    <div class="control-group">
        <span class="key">.</span>
        <span class="key">,</span>
        EXPLODE / ASSEMBLE
    </div>
    <div class="control-group">
        <span class="key">=</span>
        <span class="key">-</span>
        SCALE MODEL
    </div>
    <div class="control-group" style="opacity: 0.5;">
        MOUSE DRAG TO ROTATE
    </div>
</div>

<div id="label"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f1113);
    
    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.01, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const label = document.getElementById('label');

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const light1 = new THREE.DirectionalLight(0xffffff, 2);
    light1.position.set(5, 10, 7);
    scene.add(light1);
    const light2 = new THREE.DirectionalLight(0x00e5ff, 0.5);
    light2.position.set(-5, -5, -5);
    scene.add(light2);

    let modelRoot = new THREE.Group();
    let components = [];
    let explodeTarget = 0;
    let currentExplode = 0;
    let targetScale = 0.3; // Start small as requested
    
    const keys = { period: false, comma: false, equals: false, minus: false };

    const loader = new GLTFLoader();
    loader.load('90l_fire_extinguisher.glb', (gltf) => {
        const model = gltf.scene;
        
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        
        // Center the model relative to the root group
        model.position.sub(center);
        modelRoot.add(model);
        
        // Set small initial scale
        modelRoot.scale.set(targetScale, targetScale, targetScale);

        model.traverse((child) => {
            if (child.isMesh) {
                child.userData.originalPos = child.position.clone();
                // Vector from center for explosion
                const worldPos = new THREE.Vector3();
                child.getWorldPosition(worldPos);
                child.userData.explodeVec = worldPos.clone().normalize();
                
                if (child.material) {
                    child.material.emissiveIntensity = 0;
                    child.material.emissive.setHex(0x00e5ff);
                }
                components.push(child);
            }
        });

        scene.add(modelRoot);
        camera.position.set(0, 0, 5);
        controls.update();
    });

    window.addEventListener('keydown', (e) => {
        if (e.key === '.') keys.period = true;
        if (e.key === ',') keys.comma = true;
        if (e.key === '=') keys.equals = true;
        if (e.key === '-') keys.minus = true;
    });

    window.addEventListener('keyup', (e) => {
        if (e.key === '.') keys.period = false;
        if (e.key === ',') keys.comma = false;
        if (e.key === '=') keys.equals = false;
        if (e.key === '-') keys.minus = false;
    });

    window.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    function animate() {
        requestAnimationFrame(animate);

        // Explode logic
        if (keys.period) explodeTarget += 0.02;
        if (keys.comma) explodeTarget -= 0.02;
        explodeTarget = Math.max(0, Math.min(explodeTarget, 2.0));
        currentExplode += (explodeTarget - currentExplode) * 0.1;

        // Scale logic
        if (keys.equals) targetScale *= 1.02;
        if (keys.minus) targetScale *= 0.98;
        targetScale = Math.max(0.05, Math.min(targetScale, 5.0));
        const s = modelRoot.scale.x + (targetScale - modelRoot.scale.x) * 0.1;
        modelRoot.scale.set(s, s, s);

        components.forEach(mesh => {
            const shift = mesh.userData.explodeVec.clone().multiplyScalar(currentExplode);
            mesh.position.copy(mesh.userData.originalPos).add(shift);
        });

        controls.update();

        // Interaction
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(components);

        if (intersects.length > 0) {
            const target = intersects[0].object;
            label.style.display = 'block';
            label.innerText = target.name.replace(/_/g, ' ') || "PART";
            components.forEach(m => m.material.emissiveIntensity = 0);
            target.material.emissiveIntensity = 0.6;
        } else {
            label.style.display = 'none';
            components.forEach(m => m.material.emissiveIntensity = 0);
        }

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
