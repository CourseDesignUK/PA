<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DFRP Wildfire AR – 2m Model</title>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/three.js/build/ar-threex.js"></script>

<style>
body { margin:0; overflow:hidden; }
#overlay {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 10px;
    font-family: Arial;
    font-size: 14px;
    border-radius: 6px;
}
</style>
</head>

<body>

<div id="overlay">
Point camera at HIRO marker<br>
🔥 Tap screen to ignite
</div>

<script>

// ----------------------------------------------------
// BASIC THREE + AR SETUP
// ----------------------------------------------------

const scene = new THREE.Scene();
const camera = new THREE.Camera();
scene.add(camera);

const renderer = new THREE.WebGLRenderer({
    antialias:true,
    alpha:true
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.domElement.style.position = 'absolute';
renderer.domElement.style.top = '0px';
renderer.domElement.style.left = '0px';
document.body.appendChild(renderer.domElement);

// ----------------------------------------------------
// AR TOOLKIT SOURCE
// ----------------------------------------------------

const arToolkitSource = new THREEx.ArToolkitSource({
    sourceType: 'webcam'
});

arToolkitSource.init(() => setTimeout(onResize, 200));

window.addEventListener('resize', onResize);

function onResize(){
    arToolkitSource.onResize();
    arToolkitSource.copySizeTo(renderer.domElement);
    if(arToolkitContext.arController)
        arToolkitSource.copySizeTo(arToolkitContext.arController.canvas);
}

// ----------------------------------------------------
// AR CONTEXT
// ----------------------------------------------------

const arToolkitContext = new THREEx.ArToolkitContext({
    cameraParametersUrl:
    'https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/three.js/data/camera_para.dat',
    detectionMode: 'mono'
});

arToolkitContext.init(() => {
    camera.projectionMatrix.copy(arToolkitContext.getProjectionMatrix());
});

// ----------------------------------------------------
// HIRO MARKER
// ----------------------------------------------------

const markerRoot = new THREE.Group();
scene.add(markerRoot);

new THREEx.ArMarkerControls(arToolkitContext, markerRoot, {
    type: 'pattern',
    patternUrl:
    'https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/three.js/data/patt.hiro'
});

// ----------------------------------------------------
// LIGHTING
// ----------------------------------------------------

const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
markerRoot.add(light);

const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(2,4,2);
markerRoot.add(sun);

// ----------------------------------------------------
// SCALE CONFIG (2 METERS TOTAL WIDTH)
// ----------------------------------------------------

const ORIGINAL_WORLD_SIZE = 1500;
const TARGET_SIZE_METERS = 2.0;

const scaleFactor = TARGET_SIZE_METERS / ORIGINAL_WORLD_SIZE;

// This scales entire simulation to 2m
markerRoot.scale.set(scaleFactor, scaleFactor, scaleFactor);

// ----------------------------------------------------
// TERRAIN
// ----------------------------------------------------

const groundGeo = new THREE.PlaneGeometry(1500,1500,80,80);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x2e7d32,
    roughness:0.9
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
markerRoot.add(ground);

// ----------------------------------------------------
// FOREST INSTANCING
// ----------------------------------------------------

const TREE_COUNT = 2000;

const treeGeo = new THREE.ConeGeometry(6,20,6);
const treeMat = new THREE.MeshStandardMaterial({color:0x1b5e20});

const trees = new THREE.InstancedMesh(treeGeo, treeMat, TREE_COUNT);
markerRoot.add(trees);

let treeData = [];

const dummy = new THREE.Object3D();

for(let i=0;i<TREE_COUNT;i++){
    const x = (Math.random()-0.5)*1500;
    const z = (Math.random()-0.5)*1500;

    dummy.position.set(x,10,z);
    dummy.updateMatrix();
    trees.setMatrixAt(i,dummy.matrix);

    treeData.push({
        x:x,
        z:z,
        burning:false,
        fuel:100
    });
}

trees.instanceMatrix.needsUpdate = true;

// ----------------------------------------------------
// IGNITE ON TAP
// ----------------------------------------------------

window.addEventListener('click', () => {
    if(treeData.length > 0){
        treeData[Math.floor(Math.random()*TREE_COUNT)].burning = true;
    }
});

// ----------------------------------------------------
// FIRE UPDATE
// ----------------------------------------------------

function updateFire(){

    for(let i=0;i<TREE_COUNT;i++){
        const t = treeData[i];

        if(t.burning){
            t.fuel -= 1;

            trees.setColorAt(i,new THREE.Color(0xff4500));

            if(t.fuel <= 0){
                trees.setColorAt(i,new THREE.Color(0x111111));
                t.burning = false;
            }
        }
    }

    trees.instanceColor.needsUpdate = true;
}

// ----------------------------------------------------
// ANIMATE
// ----------------------------------------------------

function animate(){
    requestAnimationFrame(animate);

    if(arToolkitSource.ready)
        arToolkitContext.update(arToolkitSource.domElement);

    updateFire();

    renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
