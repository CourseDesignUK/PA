<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Component Explorer</title>
    <style>
        :root {
            --brand-cyan: #00e5ff;
            --brand-bg: #1a2a40;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
        }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            background: var(--brand-bg); 
            font-family: 'Inter', sans-serif; 
            color: #ffffff;
        }
        
        #instruction-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 12px 30px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            display: flex;
            gap: 20px;
            z-index: 100;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .key {
            background: rgba(255,255,255,0.15);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--brand-cyan);
            font-weight: 800;
            border: 1px solid rgba(0, 229, 255, 0.3);
        }

        #info-panel {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 280px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 24px;
            display: none;
            z-index: 100;
            box-shadow: -10px 0 30px rgba(0,0,0,0.3);
        }

        #info-panel h2 {
            color: var(--brand-cyan);
            font-size: 14px;
            margin: 0 0 12px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }

        #info-panel p {
            font-size: 12px;
            line-height: 1.6;
            margin: 0;
            opacity: 0.8;
        }

        #label {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 4px;
            display: none;
            pointer-events: none;
            border-bottom: 2px solid var(--brand-cyan);
        }

        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="instruction-panel">
    <div class="control-group">
        <span class="key">.</span>
        <span class="key">,</span>
        EXPLODE
    </div>
    <div class="control-group">
        <span class="key">-</span>
        <span class="key">+</span>
        ZOOM
    </div>
</div>

<div id="info-panel">
    <h2 id="info-title">COMPONENT</h2>
    <p id="info-desc">System diagnostic: Metadata retrieval successful. Component identified in primary assembly.</p>
</div>

<div id="label"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a2a40);
    
    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(0, 0, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const label = document.getElementById('label');
    const infoPanel = document.getElementById('info-panel');
    const infoTitle = document.getElementById('info-title');

    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    const light = new THREE.DirectionalLight(0xffffff, 2.5);
    light.position.set(5, 10, 7);
    scene.add(light);

    let modelRoot = new THREE.Group();
    let components = [];
    let explodeTarget = 0;
    let currentExplode = 0;
    
    const keys = { period: false, comma: false, plus: false, minus: false };

    const loader = new GLTFLoader();
    loader.load('90LFE2.glb', (gltf) => {
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        
        model.position.sub(center);
        modelRoot.add(model);
        modelRoot.scale.set(0.3, 0.3, 0.3);

        model.traverse((child) => {
            if (child.isMesh) {
                child.material = child.material.clone();
                child.userData.originalPos = child.position.clone();
                const worldPos = new THREE.Vector3();
                child.getWorldPosition(worldPos);
                child.userData.explodeVec = worldPos.clone().normalize();
                components.push(child);
            }
        });
        scene.add(modelRoot);
    });

    window.addEventListener('keydown', (e) => {
        if (e.key === '.') keys.period = true;
        if (e.key === ',') keys.comma = true;
        if (e.key === '=' || e.key === '+') keys.plus = true;
        if (e.key === '-') keys.minus = true;
    });

    window.addEventListener('keyup', (e) => {
        if (e.key === '.') keys.period = false;
        if (e.key === ',') keys.comma = false;
        if (e.key === '=' || e.key === '+') keys.plus = false;
        if (e.key === '-') keys.minus = false;
    });

    window.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    function animate() {
        requestAnimationFrame(animate);

        if (keys.period) explodeTarget += 0.05;
        if (keys.comma) explodeTarget -= 0.05;
        explodeTarget = Math.max(0, Math.min(explodeTarget, 10.0));
        currentExplode += (explodeTarget - currentExplode) * 0.1;

        if (keys.plus) camera.position.multiplyScalar(0.98);
        if (keys.minus) camera.position.multiplyScalar(1.02);

        components.forEach(mesh => {
            const shift = mesh.userData.explodeVec.clone().multiplyScalar(currentExplode);
            mesh.position.copy(mesh.userData.originalPos).add(shift);
        });

        controls.update();

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(components);

        if (intersects.length > 0) {
            const target = intersects[0].object;
            const name = target.name.replace(/_/g, ' ') || "SYSTEM COMPONENT";
            
            label.style.display = 'block';
            label.innerText = name;
            
            infoPanel.style.display = 'block';
            infoTitle.innerText = name;
            
            components.forEach(m => m.material.emissiveIntensity = 0);
            target.material.emissive.setHex(0x00e5ff);
            target.material.emissiveIntensity = 0.6;
        } else {
            label.style.display = 'none';
            infoPanel.style.display = 'none';
            components.forEach(m => m.material.emissiveIntensity = 0);
        }

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
