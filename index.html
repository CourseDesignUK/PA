<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Component Explorer</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
    <style>
        :root {
            --brand-cyan: #00e5ff;
            --brand-bg: #1a2a40;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --font-stack: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            background: var(--brand-bg); 
            font-family: var(--font-stack);
            -webkit-font-smoothing: antialiased;
        }
        
        #instruction-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--text-main);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 24px;
            z-index: 100;
            white-space: nowrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-group label {
            opacity: 0.7;
        }

        select, input[type="range"] {
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            color: var(--brand-cyan);
            border: 1px solid var(--glass-border);
            padding: 6px 12px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-family: var(--font-stack);
            font-size: 13px;
            transition: all 0.2s ease;
        }

        select:hover, input[type="range"]:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--brand-cyan);
        }

        option {
            background: #0f172a;
            color: white;
        }

        input[type="range"] {
            width: 80px;
            height: 4px;
            padding: 0;
            cursor: ew-resize;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 12px;
            height: 12px;
            background: var(--brand-cyan);
            border-radius: 50%;
            cursor: pointer;
        }

        .divider {
            width: 1px;
            height: 20px;
            background: var(--glass-border);
        }
    </style>
</head>
<body>

    <div id="instruction-panel">
        <div class="control-group">
            <label>MODEL</label>
            <select id="model-select">
                <option value="models/90LFE2.glb">90L</option>
                <option value="models/Water FAFA.glb">Water</option>
                <option value="models/chassis.glb">Chassis</option>
            </select>
        </div>

        <div class="divider"></div>

        <div class="control-group">
            <label>ZOOM</label>
            <input type="range" id="zoom-control" min="1" max="100" value="50">
        </div>

        <div class="divider"></div>

        <div class="control-group">
            <label>SCALE</label>
            <input type="range" id="scale-control" min="0.1" max="3.0" step="0.1" value="1.0">
        </div>
    </div>

    <script>
        const modelSelect = document.getElementById('model-select');
        const zoomControl = document.getElementById('zoom-control');
        const scaleControl = document.getElementById('scale-control');

        modelSelect.addEventListener('change', (e) => {
            console.log(`Path: ${e.target.value}`);
        });

        zoomControl.addEventListener('input', (e) => {
            console.log(`Zoom Level: ${e.target.value}`);
        });

        scaleControl.addEventListener('input', (e) => {
            console.log(`Model Scale: ${e.target.value}`);
        });
    </script>
</body>
</html>
