<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Voice Assistant</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --accent-color: #38bdf8;
            --secondary-text: #94a3b8;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
        }
        #app-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .header { text-align: center; margin-bottom: 2rem; }
        #status { font-size: 0.875rem; color: var(--accent-color); font-weight: bold; text-transform: uppercase; }
        
        #transcript-container {
            background: rgba(0,0,0,0.3);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--accent-color);
        }
        #transcript { font-style: italic; color: var(--secondary-text); }

        .controls { display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; }
        button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        #mic-btn { background-color: var(--accent-color); color: var(--bg-color); }
        #clear-btn { background-color: #ef4444; color: white; }
        button:active { transform: scale(0.95); }

        #history-section { border-top: 1px solid #334155; padding-top: 1rem; }
        .history-item {
            background: rgba(255,255,255,0.05);
            padding: 0.75rem;
            border-radius: 0.4rem;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }
        .timestamp { color: var(--secondary-text); font-size: 0.75rem; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header">
        <div id="status">Ready</div>
        <h2>Core Assistant</h2>
    </div>

    <div id="transcript-container">
        <div id="transcript">Awaiting voice command...</div>
    </div>

    <div class="controls">
        <button id="mic-btn">Start Listening</button>
        <button id="clear-btn">Clear History</button>
    </div>

    <div id="history-section">
        <h4 style="margin-bottom: 1rem;">Command History</h4>
        <div id="history-list"></div>
    </div>
</div>

<script>
    const micBtn = document.getElementById('mic-btn');
    const clearBtn = document.getElementById('clear-btn');
    const transcriptDiv = document.getElementById('transcript');
    const statusDiv = document.getElementById('status');
    const historyList = document.getElementById('history-list');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    // Load history on startup
    displayHistory();

    if (!SpeechRecognition) {
        statusDiv.textContent = "Speech API Not Supported";
        micBtn.disabled = true;
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';

        recognition.onstart = () => {
            statusDiv.textContent = "Listening...";
            micBtn.style.background = "#22c55e";
        };

        recognition.onresult = (event) => {
            const command = event.results[0][0].transcript;
            transcriptDiv.textContent = `"${command}"`;
            saveToHistory(command);
            processCommand(command.toLowerCase());
        };

        recognition.onend = () => {
            statusDiv.textContent = "Ready";
            micBtn.style.background = "var(--accent-color)";
        };

        micBtn.addEventListener('click', () => recognition.start());
    }

    function saveToHistory(text) {
        const history = JSON.parse(localStorage.getItem('assistant_history') || '[]');
        const entry = {
            text: text,
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        };
        history.unshift(entry); // Add to beginning
        localStorage.setItem('assistant_history', JSON.stringify(history.slice(0, 10))); // Keep last 10
        displayHistory();
    }

    function displayHistory() {
        const history = JSON.parse(localStorage.getItem('assistant_history') || '[]');
        historyList.innerHTML = history.map(item => `
            <div class="history-item">
                <span>${item.text}</span>
                <span class="timestamp">${item.time}</span>
            </div>
        `).join('');
    }

    clearBtn.addEventListener('click', () => {
        localStorage.removeItem('assistant_history');
        displayHistory();
    });

    function processCommand(cmd) {
        const synth = window.speechSynthesis;
        const msg = new SpeechSynthesisUtterance();

        if (cmd.includes('time')) {
            msg.text = `It is currently ${new Date().toLocaleTimeString()}`;
        } else if (cmd.includes('reminder')) {
            msg.text = "Reminder feature requires backend integration. Local state updated.";
        } else if (cmd.includes('clear history')) {
            clearBtn.click();
            msg.text = "History purged.";
        } else {
            msg.text = "Input logged to history.";
        }
        synth.speak(msg);
    }
</script>

</body>
</html>
