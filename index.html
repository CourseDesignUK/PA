<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>DFRP Wildfire Simulator v1.0 - 2m Scale</title>
<style>
body { margin: 0; overflow: hidden; background: #eef0f5; font-family: 'Segoe UI', sans-serif; }
#splashScreen {
position: fixed; top: 0; left: 0; width: 100%; height: 100%;
background: #111; z-index: 2000;
display: flex; flex-direction: column; align-items: center; justify-content: center;
transition: opacity 0.8s ease-out;
}
.splash-content { text-align: center; color: white; animation: fadeIn 1.5s ease-out; }
#startAppBtn {
padding: 15px 50px; font-size: 18px; font-weight: bold; text-transform: uppercase;
background: #d32f2f; color: white; border: none; border-radius: 50px; cursor: pointer;
}
#ui {
position: absolute; top: 10px; left: 10px; background: rgba(255, 255, 255, 0.95);
padding: 15px; border-radius: 8px; width: 290px; z-index: 10;
transition: transform 0.5s, opacity 0.5s;
}
.ui-hidden { transform: translateX(-320px); opacity: 0; }
.control { margin-bottom: 15px; }
label { display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; color: #666; }
input[type=range] { width: 100%; accent-color: #d32f2f; }
#toolbar {
position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
display: flex; gap: 20px; background: white; padding: 12px 25px;
border-radius: 50px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); z-index: 100;
}
.tool { width: 54px; height: 54px; border-radius: 50%; border: 2px solid #eee; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; }
.tool.active { border-color: #d32f2f; background: #fff0f0; }
#loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #eef0f5; display: flex; justify-content: center; align-items: center; z-index: 999; }
</style>
<script type="importmap">
{
"imports": {
"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
"three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}
}
</script>
</head>
<body>

<div id="splashScreen">
<div class="splash-content">
<h1>DFRP WILDFIRE SIMULATOR</h1>
<p>2-Meter Micro-Scale Physics Simulation</p>
<button id="startAppBtn">Start Simulation</button>
</div>
</div>

<div id="loading">Generating Environment...</div>

<div id="ui">
<h3>DFRP Micro v1.5</h3>
<div class="control">
<label>Simulation Speed <span id="simSpeedVal">1.0x</span></label>
<input type="range" id="simSpeed" min="0.1" max="5.0" step="0.1" value="1.0">
</div>
<div class="control">
<label>Wind Heading <span id="windDirVal">0°</span></label>
<input type="range" id="windDir" min="0" max="360" value="0">
</div>
<div class="control">
<label>Elevation (mm) <span id="elevVal">30</span></label>
<input type="range" id="elevGen" min="1" max="100" value="30">
</div>
<button id="resetBtn" style="width:100%; padding:10px; background:#d32f2f; color:white; border:none; cursor:pointer;">Regenerate Map</button>
</div>

<div id="toolbar">
<div class="tool" id="toolIgnite">🔥</div>
<div class="tool" id="toolCut">🪓</div>
<div style="padding: 0 15px; border-left: 1px solid #eee; display:flex; flex-direction:column; justify-content:center;">
<span style="font-size:9px; color:#999;">Area Burned</span>
<span id="acresDisplay" style="font-weight:bold;">0.00</span><small>cm²</small>
</div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const CONFIG = {
    count: 100000,
    worldSize: 2.0,
    cellSize: 0.04,
    baseSpreadRate: 0.05,
    dryingRate: 0.07,
    unitScale: 10000 // To convert internal units to cm2 for UI
};

const S_LIVE = 0, S_DRYING = 1, S_BURNING = 2, S_CHARRED = 3, S_CUT = 4;
const F_GRASS = 0, F_BRUSH = 1, F_TIMBER = 2;

const FUEL_PROPS = {
    [F_GRASS]:  { spread: 2.5, burn: 0.4,  scaleY: 0.002, scaleXZ: 0.006, col: 0x7cfc00 },
    [F_BRUSH]:  { spread: 1.0, burn: 1.0,  scaleY: 0.008, scaleXZ: 0.012, col: 0x556b2f },
    [F_TIMBER]: { spread: 0.4, burn: 3.5,  scaleY: 0.03,  scaleXZ: 0.008, col: 0x004d00 }
};

let currentTool = null, simSpeedMultiplier = 1.0, spatialMap = [], areaBurned = 0, simMinutes = 600;
let cfgElevation = 0.03, cfgRoughness = 2.5, cfgDensity = 1.0;

const mapDim = Math.ceil(CONFIG.worldSize / CONFIG.cellSize) + 2;
const mapOffset = CONFIG.worldSize / 2;
const STRIDE = 8;
let data = new Float32Array(CONFIG.count * STRIDE);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(35, window.innerWidth/window.innerHeight, 0.01, 20);
camera.position.set(-1.5, 1.2, 1.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(2, 5, 2);
scene.add(sun);
scene.add(new THREE.AmbientLight(0x404040, 1.0));

const groundGeo = new THREE.PlaneGeometry(2.1, 2.1, 100, 100);
const ground = new THREE.Mesh(groundGeo, new THREE.MeshStandardMaterial({ vertexColors: true }));
ground.rotation.x = -Math.PI/2;
scene.add(ground);

const fuelGeo = new THREE.BoxGeometry(1, 1, 1);
fuelGeo.translate(0, 0.5, 0);
const mesh = new THREE.InstancedMesh(fuelGeo, new THREE.MeshStandardMaterial(), CONFIG.count);
scene.add(mesh);

const _mat = new THREE.Matrix4(), _vpos = new THREE.Vector3(), _vscale = new THREE.Vector3(), _vquat = new THREE.Quaternion(), _vcol = new THREE.Color();
let windVec = { x: 0, z: -1 }, windSpeed = 25, baseMoisture = 15;

function getElevation(x, z) {
    return (Math.sin(x * cfgRoughness) + Math.cos(z * cfgRoughness)) * cfgElevation;
}

function init() {
    areaBurned = 0;
    document.getElementById(&#39;loading&#39;).style.display = &#39;flex&#39;;
    spatialMap = new Array(mapDim * mapDim).fill(0).map(() =&gt; []);

    const pos = groundGeo.attributes.position;
    const cols = new Float32Array(pos.count * 3);
    for(let i=0; i&lt;pos.count; i++) {
        const h = getElevation(pos.getX(i), -pos.getY(i));
        pos.setZ(i, h);
        cols[i*3] = 0.3; cols[i*3+1] = 0.25; cols[i*3+2] = 0.15;
    }
    groundGeo.attributes.position.needsUpdate = true;
    groundGeo.setAttribute(&#39;color&#39;, new THREE.BufferAttribute(cols, 3));

    for(let i=0; i&lt;CONFIG.count; i++) {
        const idx = i * STRIDE;
        const x = (Math.random()-0.5) * CONFIG.worldSize;
        const z = (Math.random()-0.5) * CONFIG.worldSize;
        const y = getElevation(x, z);
        const type = Math.random() &gt; 0.8 ? F_TIMBER : (Math.random() &gt; 0.4 ? F_BRUSH : F_GRASS);
        const props = FUEL_PROPS[type];

        data[idx] = x; data[idx+1] = z; data[idx+2] = S_LIVE; data[idx+3] = baseMoisture * 10;
        data[idx+4] = 3000 * props.burn; data[idx+6] = y; data[idx+7] = type;

        _vpos.set(x, y, z);
        _vscale.set(props.scaleXZ, props.scaleY, props.scaleXZ);
        _mat.compose(_vpos, _vquat, _vscale);
        mesh.setMatrixAt(i, _mat);
        mesh.setColorAt(i, _vcol.setHex(props.col));
    }
    mesh.instanceMatrix.needsUpdate = true;
    mesh.instanceColor.needsUpdate = true;
    document.getElementById(&#39;loading&#39;).style.display = &#39;none&#39;;
}

function updatePhysics() {
    for(let i=0; i&lt;spatialMap.length; i++) spatialMap[i].length = 0;
    let active = 0;
    for(let i=0; i&lt;CONFIG.count; i++) {
        if(data[i*STRIDE+2] === S_BURNING) {
            active++;
            const gx = Math.floor((data[i*STRIDE] + mapOffset) / CONFIG.cellSize);
            const gz = Math.floor((data[i*STRIDE+1] + mapOffset) / CONFIG.cellSize);
            if(gx&gt;=0 &amp;&amp; gx&lt;mapDim &amp;&amp; gz&gt;=0 &amp;&amp; gz&lt;mapDim) spatialMap[gz*mapDim+gx].push(i);
        }
    }
    if(active === 0) return;

    let needColor = false, needMatrix = false;
    for(let i=0; i&lt;CONFIG.count; i++) {
        const idx = i * STRIDE, state = data[idx+2];
        if(state === S_CHARRED || state === S_CUT) continue;

        if(state === S_BURNING) {
            data[idx+4] -= 1.0 * simSpeedMultiplier;
            if(data[idx+4] &lt;= 0) {
                data[idx+2] = S_CHARRED; areaBurned += 0.0001;
                mesh.setColorAt(i, _vcol.setHex(0x111111));
                _vpos.set(data[idx], data[idx+6], data[idx+1]);
                _vscale.set(FUEL_PROPS[data[idx+7]].scaleXZ, 0.0001, FUEL_PROPS[data[idx+7]].scaleXZ);
                _mat.compose(_vpos, _vquat, _vscale);
                mesh.setMatrixAt(i, _mat); needColor = true; needMatrix = true;
            }
            continue;
        }

        const gx = Math.floor((data[idx]+mapOffset)/CONFIG.cellSize), gz = Math.floor((data[idx+1]+mapOffset)/CONFIG.cellSize);
        let heat = 0;
        for(let nz=gz-1; nz&lt;=gz+1; nz++) {
            for(let nx=gx-1; nx&lt;=gx+1; nx++) {
                if(nx&lt;0 || nx&gt;=mapDim || nz&lt;0 || nz&gt;=mapDim) continue;
                const cell = spatialMap[nz*mapDim+nx];
                for(let k=0; k&lt;cell.length; k++) {
                    const nIdx = cell[k]*STRIDE;
                    const dx = data[idx]-data[nIdx], dz = data[idx+1]-data[nIdx+1];
                    const dSq = dx*dx + dz*dz;
                    if(dSq &lt; 0.0016) { // 4cm radius
                        const d = Math.sqrt(dSq), dot = (dx/d)*windVec.x + (dz/d)*windVec.z;
                        let wB = dot &gt; 0 ? 1.0 + (dot*windSpeed*0.15) : 0.5;
                        heat += (1.0 - d/0.04) * wB * FUEL_PROPS[data[nIdx+7]].spread * CONFIG.baseSpreadRate * simSpeedMultiplier;
                    }
                }
            }
        }
        if(heat &gt; 0) {
            data[idx+3] -= heat * CONFIG.dryingRate;
            if(data[idx+3] &lt;= 0) {
                data[idx+2] = S_BURNING; mesh.setColorAt(i, _vcol.setHex(0xff4500)); needColor = true;
            }
        }
    }
    if(needColor) mesh.instanceColor.needsUpdate = true;
    if(needMatrix) mesh.instanceMatrix.needsUpdate = true;
    document.getElementById(&#39;acresDisplay&#39;).textContent = (areaBurned * CONFIG.unitScale).toFixed(2);
}

const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
window.addEventListener(&#39;mousedown&#39;, (e) =&gt; {
    if(!currentTool) return;
    mouse.x = (e.clientX/window.innerWidth)*2-1; mouse.y = -(e.clientY/window.innerHeight)*2+1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObject(ground);
    if(hits.length &gt; 0) {
        const pt = hits[0].point;
        for(let i=0; i&lt;CONFIG.count; i++) {
            const idx = i*STRIDE;
            const distSq = Math.pow(data[idx]-pt.x, 2) + Math.pow(data[idx+1]-pt.z, 2);
            if(distSq &lt; 0.0004) { // 2cm brush
                if(currentTool === &#39;ignite&#39;) { data[idx+2] = S_BURNING; data[idx+3] = 0; }
                else if(currentTool === &#39;cut&#39;) { data[idx+2] = S_CUT; _mat.makeScale(0,0,0); mesh.setMatrixAt(i, _mat); }
            }
        }
        mesh.instanceMatrix.needsUpdate = true;
    }
});

document.getElementById(&#39;toolIgnite&#39;).onclick = () =&gt; currentTool = &#39;ignite&#39;;
document.getElementById(&#39;toolCut&#39;).onclick = () =&gt; currentTool = &#39;cut&#39;;
document.getElementById(&#39;resetBtn&#39;).onclick = () =&gt; init();
document.getElementById(&#39;simSpeed&#39;).oninput = (e) =&gt; {
    simSpeedMultiplier = parseFloat(e.target.value);
    document.getElementById(&#39;simSpeedVal&#39;).textContent = simSpeedMultiplier.toFixed(1) + &quot;x&quot;;
};
document.getElementById(&#39;elevGen&#39;).oninput = (e) =&gt; {
    cfgElevation = parseInt(e.target.value) / 1000;
    document.getElementById(&#39;elevVal&#39;).textContent = e.target.value;
};
document.getElementById(&#39;startAppBtn&#39;).onclick = () =&gt; document.getElementById(&#39;splashScreen&#39;).style.display = &#39;none&#39;;

init();
function animate() { requestAnimationFrame(animate); updatePhysics(); controls.update(); renderer.render(scene, camera); }
animate();
</script>

</body>
</html>
